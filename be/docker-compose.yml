version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: janamat-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/janamat_rewards
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - janamat-net

  mongo:
    image: mongo:7
    container_name: janamat-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - janamat-net

volumes:
  mongo-data:

networks:
  janamat-net:
    driver: bridge
